      .main-container {

      }

      .question-tab {
        border: 2px solid gray;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        display: flex;
        gap: 20px;
        background-color: #1a1a1a;
      }

      .q-options {
        border-right: 2px solid gray;
        flex: 1 1 60%;
        padding-right: 20px;
      }

      .img-container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex: 1 1 40%;
      }

      img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
      }

      h1 {
        font-family: "Manrope", sans-serif;
        margin-bottom: 15px;
        font-size: 1.5rem;
      }

      .options {
        list-style-type: none;
      }

      /* Styling for the clickable options */
      .option-item {
        background-color: #333;
        padding: 12px 15px;
        margin-bottom: 10px;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s ease;
        border: 1px solid transparent;
      }

      .option-item:hover {
        background-color: #444;
      }

      /* Styles applied via JavaScript when clicked */
      .option-item.correct {
        background-color: #2e7d32; /* Green */
        color: white;
        border-color: #4caf50;
      }

      .option-item.wrong {
        background-color: #c62828; /* Red */
        color: white;
        border-color: #ef5350;
      }

      /* Disable clicking after an answer is chosen */
      .options.answered .option-item {
        pointer-events: none;
      }

      /* Keep unselected options slightly faded after answering */
      .options.answered .option-item:not(.correct):not(.wrong) {
        opacity: 0.5;
      }

      @media (max-width: 768px) {
        .question-tab {
          flex-direction: column;
        }
        .q-options {
          padding-right: 0;
          padding-bottom: 20px;
          border-right: none;
          border-bottom: 2px solid gray;
        }
      }
    </style>

      const mainContainer = document.querySelector(".main-container");

      // 1. Generate the HTML for the questions
      questionData.forEach((item) => {
        const { id, question, imageID, options, answerOption } = item;

        // Notice we added data-id and data-choice to the li tags so JS knows what was clicked
        const html = `
        <div class="question-tab">
          <div class="q-options">
            <h1><span>${id}. </span>${question}</h1>
            <p style="margin-bottom: 15px; color: #aaa;">Select an option below:</p>
            <ul class="options" data-question-id="${id}">
              <li class="option-item" data-choice="a"><b>a.</b> ${options.a}</li>
              <li class="option-item" data-choice="b"><b>b.</b> ${options.b}</li>
              <li class="option-item" data-choice="c"><b>c.</b> ${options.c}</li>
              <li class="option-item" data-choice="d"><b>d.</b> ${options.d}</li>
            </ul>
          </div>
          <div class="img-container">
            <img src="data/img/${imageID}.png" alt="Question Image" onerror="this.style.display='none'" />
          </div>
        </div>`;

        mainContainer.insertAdjacentHTML("beforeend", html);
      });

      // 2. Add Event Listener to handle the clicks
      mainContainer.addEventListener("click", function (event) {
        // Check if what was clicked was an option item
        const clickedOption = event.target.closest(".option-item");

        if (!clickedOption) return; // If clicked somewhere else, do nothing

        const optionsList = clickedOption.closest(".options");

        // Prevent clicking again if already answered
        if (optionsList.classList.contains("answered")) return;

        const questionId = parseInt(
          optionsList.getAttribute("data-question-id"),
        );
        const userChoice = clickedOption.getAttribute("data-choice");

        // Find the correct answer from our data array
        const question = questionData.find((q) => q.id === questionId);
        const correctAnswer = question.answerOption;

        // Lock the question so it can't be clicked again
        optionsList.classList.add("answered");

        // Check if the user is correct
        if (userChoice === correctAnswer) {
          // User got it right
          clickedOption.classList.add("correct");
        } else {
          // User got it wrong
          clickedOption.classList.add("wrong");

          // Still show them which one was actually correct!
          const correctOptionElement = optionsList.querySelector(
            `[data-choice="${correctAnswer}"]`,
          );
          if (correctOptionElement) {
            correctOptionElement.classList.add("correct");
          }
        }
      });
    </script>
